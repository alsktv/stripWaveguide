<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strip Waveguide 3D Simulator</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

  <div id="canvas-container"></div>

  <!-- 우측 상단 3D 축 나침반 & 도파로 개수 선택기 -->
  <div id="top-right-controls">
    <div id="wg-count-selector">
      <span class="selector-label">Waveguides:</span>
      <button id="btn-wg-1" class="btn-toggle-wg active" onclick="setWaveguideCount(1)">1</button>
      <button id="btn-wg-2" class="btn-toggle-wg" onclick="setWaveguideCount(2)">2</button>
    </div>
    <div id="axis-container"></div>
  </div>

  <div id="ui-panel">
    <h2>Strip Waveguide Controls</h2>

    <!-- 1. Refractive Index & Presets -->
    <div class="section-title">Refractive Index (n)</div>
    
    <div class="preset-group">
      <span class="preset-label">Core Presets:</span>
      <button class="btn-preset" onclick="setCoreMaterial('Si', 3.45)">Si (3.45)</button>
      <button class="btn-preset" onclick="setCoreMaterial('SiN', 2.00)">SiN (2.00)</button>
      <button class="btn-preset" onclick="setCoreMaterial('Polymer', 1.50)">Polymer (1.50)</button>
    </div>

    <div class="preset-group">
      <span class="preset-label">Cladding Presets:</span>
      <button class="btn-preset" onclick="setCladdMaterial('SiO2', 1.45)">SiO₂ (1.45)</button>
      <button class="btn-preset" onclick="setCladdMaterial('Air', 1.00)">Air (1.00)</button>
      <button class="btn-preset" onclick="setCladdMaterial('Polymer', 1.50)">Polymer (1.50)</button>
    </div>

    <div class="control-group">
      <label>Core n: <span id="n-core-val">3.45</span></label>
      <input type="range" id="n-core-slider" min="1.0" max="4.0" step="0.01" value="3.45">
    </div>

    <div class="control-group">
      <label>Cladding n: <span id="n-cladd-val">1.45</span></label>
      <input type="range" id="n-cladd-slider" min="1.0" max="3.0" step="0.01" value="1.45">
    </div>

    <hr class="divider">

    <!-- 2. Core 1 Dimensions -->
    <div class="section-title">Core 1 Dimensions (nm)</div>
    <div class="control-group">
      <label>Width ($w_1$): <span id="w-core-val">450</span> nm</label>
      <input type="range" id="w-core-slider" min="200" max="1000" step="10" value="450">
    </div>
    <div class="control-group">
      <label>Height ($h_1$): <span id="h-core-val">220</span> nm</label>
      <input type="range" id="h-core-slider" min="100" max="600" step="10" value="220">
    </div>
    <div class="control-group">
      <label>Length ($L_1$): <span id="l-core-val">3000</span> nm</label>
      <input type="range" id="l-core-slider" min="1000" max="8000" step="100" value="3000">
    </div>

    <!-- 2-2. Core 2 Dimensions & Gap Settings (Waveguide 2 선택 시 표시) -->
    <div id="wg2-panel" style="display: none;">
      <hr class="divider">
      <div class="section-title" style="color: #f43f5e;">Core 2 & Gap Settings (nm)</div>
      
      <div class="control-group">
        <label>Core 2 n: <span id="n-core2-val">3.45</span></label>
        <input type="range" id="n-core2-slider" min="1.0" max="4.0" step="0.01" value="3.45">
      </div>

      <div class="control-group">
        <label>Gap ($g$): <span id="gap-val">200</span> nm</label>
        <input type="range" id="gap-slider" min="50" max="1000" step="10" value="200">
      </div>
      <div class="control-group">
        <label>Width ($w_2$): <span id="w-core2-val">450</span> nm</label>
        <input type="range" id="w-core2-slider" min="200" max="1000" step="10" value="450">
      </div>
      <div class="control-group">
        <label>Height ($h_2$): <span id="h-core2-val">220</span> nm</label>
        <input type="range" id="h-core2-slider" min="100" max="600" step="10" value="220">
      </div>
      <div class="control-group">
        <label>Length ($L_2$): <span id="l-core2-val">3000</span> nm</label>
        <input type="range" id="l-core2-slider" min="1000" max="8000" step="100" value="3000">
      </div>
    </div>

    <hr class="divider">

    <!-- 3. Lower Cladding -->
    <div class="section-title">Lower Cladding (BOX) (nm)</div>
    <div class="control-group">
      <label>Width: <span id="w-sub-val">2500</span> nm</label>
      <input type="range" id="w-sub-slider" min="500" max="5000" step="50" value="2500">
    </div>
    <div class="control-group">
      <label>Height: <span id="h-sub-val">400</span> nm</label>
      <input type="range" id="h-sub-slider" min="100" max="1000" step="20" value="400">
    </div>
    <div class="control-group">
      <label>Length: <span id="l-sub-val">3000</span> nm</label>
      <input type="range" id="l-sub-slider" min="1000" max="8000" step="100" value="3000">
    </div>

    <hr class="divider">

    <!-- 4. Upper Cladding -->
    <div class="section-title">Upper Cladding (Cover) (nm)</div>
    <div class="control-group">
      <label>Width: <span id="w-top-val">2500</span> nm</label>
      <input type="range" id="w-top-slider" min="500" max="5000" step="50" value="2500">
    </div>
    <div class="control-group">
      <label>Height: <span id="h-top-val">600</span> nm</label>
      <input type="range" id="h-top-slider" min="100" max="1500" step="20" value="600">
    </div>
    <div class="control-group">
      <label>Length: <span id="l-top-val">3000</span> nm</label>
      <input type="range" id="l-top-slider" min="1000" max="8000" step="100" value="3000">
    </div>

    <hr class="divider">

    <!-- 5. Laser Settings -->
    <button class="btn-toggle" onclick="toggleLaserPanel()">
      Laser Settings & Spectrum ▼
    </button>
    
    <div id="laser-panel" class="collapsible-content">
      <div class="control-group">
        <label>Center Wavelength ($\lambda_0$): <span id="wavelength-val">1550</span> nm</label>
        <input type="range" id="wavelength-slider" min="850" max="1650" step="10" value="1550">
      </div>

      <div class="sub-title">Incident Angles (deg)</div>
      <div class="control-group">
        <label>Angle X (Pitch): <span id="rot-x-val">0</span>°</label>
        <input type="range" id="rot-x-slider" min="-45" max="45" step="1" value="0">
      </div>
      <div class="control-group">
        <label>Angle Y (Yaw): <span id="rot-y-val">0</span>°</label>
        <input type="range" id="rot-y-slider" min="-45" max="45" step="1" value="0">
      </div>

      <div class="sub-title">Gaussian Pulse Parameters</div>
      <div class="control-group">
        <label>Spectral Width ($\Delta\lambda$): <span id="pulse-width-val">30</span> nm</label>
        <input type="range" id="pulse-width-slider" min="5" max="100" step="1" value="30">
      </div>
      <div class="control-group">
        <label>Intensity ($I_0$): <span id="intensity-val">1.0</span> a.u.</label>
        <input type="range" id="intensity-slider" min="0.1" max="3.0" step="0.1" value="1.0">
      </div>

      <div class="sub-title">Spectrum Graph ($I$ vs $\lambda$)</div>
      <div class="graph-box">
        <canvas id="spectrum-canvas" width="260" height="120"></canvas>
      </div>
    </div>

    <!-- 6. Physics Report Link -->
    <hr class="divider">
    <button class="btn-toggle" style="background: #334155; border: 1px solid rgba(255, 255, 255, 0.1); color: #38bdf8;" onclick="window.open('report.html', '_blank')">
      📄 Physics Model Report (PDF)
    </button>

  </div>

  <script src="main.js"></script>
</body>
</html>
